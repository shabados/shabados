name: publish (web)

# release-please (with include-component-in-tag: true) pushes tags like "web-v5.0.0".
# Every step below is a dry-run placeholder — nothing in this file may actually publish.
# It has a `# TODO cutover:` comment showing the real command to swap in once the
# monorepo import is verified end-to-end.

on:
  push:
    tags:
      - 'web-v*'
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            apps/web
            package.json
            mise.toml
          filter: blob:none
      - uses: jdx/mise-action@v4
      - run: cd apps/web && SKIP_ARTIFACTS=1 bun install
      - run: cd apps/web && bun run --if-present build
      # TODO cutover: cd apps/web && firebase deploy --non-interactive   (needs FIREBASE_TOKEN / service account secret)
      - run: 'echo "DRY RUN: would run firebase deploy from apps/web/"'
