name: CI (database)

on:
  pull_request:
    paths:
      - 'database/**'
      - 'package.json'
      - 'biome.json'
      - 'mise.toml'
      - '.github/workflows/ci-database.yml'
  push:
    branches: [main]
    paths:
      - 'database/**'
      - 'package.json'
      - 'biome.json'
      - 'mise.toml'
      - '.github/workflows/ci-database.yml'

jobs:
  database:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Only database's CI may materialize database/collections (604M of JSON) —
          # every other area's CI must sparse-checkout around it.
          sparse-checkout: |
            database
            package.json
            biome.json
            mise.toml
          filter: blob:none

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: cd database && bun install

      - name: Lint (biome check .)
        run: cd database && bun run --if-present lint

      - name: Typecheck (tsc --noEmit)
        run: cd database && bun run --if-present types

      - name: Validate collections
        run: cd database && bun run --if-present collections:validate

      - name: Build database (dist/master.sqlite via drizzle)
        run: cd database && bun run --if-present database:build

      - name: Test (bun test)
        run: cd database && bun run --if-present test
