name: CI (library)

on:
  pull_request:
    paths:
      - 'apps/library/**'
      - 'package.json'
      - 'biome.json'
      - 'mise.toml'
      - '.github/workflows/ci-library.yml'
  push:
    branches: [main]
    paths:
      - 'apps/library/**'
      - 'package.json'
      - 'biome.json'
      - 'mise.toml'
      - '.github/workflows/ci-library.yml'

jobs:
  library:
    name: Typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            apps/library
            package.json
            biome.json
            mise.toml
          filter: blob:none

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        env:
          SKIP_ARTIFACTS: '1'
        run: cd apps/library && bun install

      # library has no top-level "lint" script today (electron-vite app; nothing to guard here)
      - name: Typecheck (typecheck:node + typecheck:web)
        run: cd apps/library && bun run --if-present typecheck

      - name: Build (electron-vite build)
        run: cd apps/library && bun run --if-present build
